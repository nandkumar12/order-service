name: 🚀 Deploy to AWS Lambda

on:
  push:
    branches:
      - main
      - develop
      - master
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: dev

jobs:
  build:
    name: 🔨 Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🔨 Build with Maven
        run: |
          mvn clean package -DskipTests

      - name: 📦 Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: order-service.jar
          path: target/order-service.jar

  deploy:
    name: 🚀 Deploy to AWS
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 📦 Download artifact
        uses: actions/download-artifact@v3
        with:
          name: order-service.jar

      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🪣 Upload JAR to S3
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          S3_BUCKET="lambda-code-${ACCOUNT_ID}-${AWS_REGION}"
          aws s3 mb s3://$S3_BUCKET --region $AWS_REGION || true
          aws s3 cp order-service.jar s3://$S3_BUCKET/order-service.jar
          echo "S3_BUCKET=$S3_BUCKET" >> $GITHUB_ENV

      - name: ☁️ Deploy CloudFormation Stack
        run: |
          aws cloudformation deploy \
            --template-file cloudformation-template.yaml \
            --stack-name order-service-stack-${{ env.ENVIRONMENT }} \
            --parameter-overrides EnvironmentName=${{ env.ENVIRONMENT }} \
            --capabilities CAPABILITY_IAM \
            --region ${{ env.AWS_REGION }} \
            --no-fail-on-empty-changeset

      - name: 📊 Get Stack Outputs
        run: |
          API_ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name order-service-stack-${{ env.ENVIRONMENT }} \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiEndpoint`].OutputValue' \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "API_ENDPOINT=$API_ENDPOINT" >> $GITHUB_ENV

      - name: ✅ Deployment Success
        run: |
          echo "🎉 Deployment Complete!"
          echo "API Endpoint: ${{ env.API_ENDPOINT }}"
          echo "Environment: ${{ env.ENVIRONMENT }}"
          echo "Region: ${{ env.AWS_REGION }}"

      - name: 📧 Send Deployment Notification
        if: success()
        run: |
          echo "✅ Deployment successful at $(date)"

